<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebVuln Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="url(#grad1)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#818cf8"/>
              <stop offset="100%" style="stop-color:#f472b6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-text">
        <span class="header-title">WebVuln Scanner</span>
        <span class="header-sub">Static Security Analyzer</span>
      </div>
    </div>
    <div class="header-right">
      <div id="status-dot" class="status-dot idle" title="준비됨"></div>
    </div>
  </header>

  <!-- ── 페이지 정보 ── -->
  <div id="page-info" class="page-info hidden">
    <div class="page-icon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#818cf8" stroke-width="2"/>
        <path d="M12 8v4M12 16h.01" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <span id="page-url" class="page-url">...</span>
    <span id="https-badge" class="badge-https hidden">HTTPS</span>
  </div>

  <!-- ── 스캔 버튼 영역 ── -->
  <div class="scan-area">
    <button id="scan-btn" class="scan-btn">
      <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span id="btn-text">스캔 시작</span>
    </button>
  </div>

  <!-- ── 로딩 ── -->
  <div id="loading" class="loading hidden">
    <div class="scan-animation">
      <div class="scan-ring"></div>
      <div class="scan-ring ring2"></div>
      <div class="scan-ring ring3"></div>
      <svg class="scan-icon-inner" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="url(#g2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#818cf8"/>
            <stop offset="100%" style="stop-color:#f472b6"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <p class="loading-text">코드 분석 중<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
  </div>

  <!-- ── 결과 없음 (클린) ── -->
  <div id="result-clean" class="result-clean hidden">
    <div class="clean-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
        <path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="clean-title">취약점이 발견되지 않았습니다</p>
    <p class="clean-sub">정적 분석 기준으로 안전한 페이지입니다</p>
  </div>

  <!-- ── 요약 카드 ── -->
  <div id="summary" class="summary hidden">
    <div class="summary-card critical" id="cnt-critical">
      <span class="summary-num">0</span>
      <span class="summary-label">Critical</span>
    </div>
    <div class="summary-card high" id="cnt-high">
      <span class="summary-num">0</span>
      <span class="summary-label">High</span>
    </div>
    <div class="summary-card medium" id="cnt-medium">
      <span class="summary-num">0</span>
      <span class="summary-label">Medium</span>
    </div>
    <div class="summary-card low" id="cnt-low">
      <span class="summary-num">0</span>
      <span class="summary-label">Low</span>
    </div>
  </div>

  <!-- ── 필터 탭 ── -->
  <div id="filter-tabs" class="filter-tabs hidden">
    <button class="filter-tab active" data-filter="ALL">전체</button>
    <button class="filter-tab" data-filter="CRITICAL">Critical</button>
    <button class="filter-tab" data-filter="HIGH">High</button>
    <button class="filter-tab" data-filter="MEDIUM">Medium</button>
  </div>

  <!-- ── 취약점 목록 ── -->
  <div id="vuln-list" class="vuln-list hidden"></div>

  <!-- ── 상세 모달 ── -->
  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-area">
          <span id="modal-severity-badge" class="severity-badge"></span>
          <h2 id="modal-title" class="modal-title"></h2>
        </div>
        <button id="modal-close" class="modal-close" aria-label="닫기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-meta">
          <span id="modal-cwe" class="meta-tag cwe"></span>
          <span id="modal-category" class="meta-tag category"></span>
          <span id="modal-count" class="meta-tag count"></span>
        </div>
        <div class="modal-section">
          <h3 class="section-label">⚠️ 취약점 설명</h3>
          <p id="modal-description" class="section-content"></p>
        </div>
        <div class="modal-section">
          <h3 class="section-label">🛡️ 수정 권고사항</h3>
          <p id="modal-recommendation" class="section-content recommendation"></p>
        </div>
        <div class="modal-section" id="modal-findings-section">
          <h3 class="section-label">🔍 탐지된 위치</h3>
          <div id="modal-findings" class="findings-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 오류 상태 ── -->
  <div id="error-state" class="error-state hidden">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#f87171" stroke-width="1.8"/>
      <path d="M12 8v4M12 16h.01" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <p id="error-msg" class="error-msg">분석 중 오류가 발생했습니다</p>
    <p class="error-sub">이 페이지에서는 분석이 지원되지 않을 수 있습니다</p>
  </div>

  <!-- ── 푸터 ── -->
  <footer class="footer">
    <span id="scan-time" class="scan-time"></span>
    <span class="footer-sep">·</span>
    <span class="footer-brand">WebVuln Scanner v1.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
